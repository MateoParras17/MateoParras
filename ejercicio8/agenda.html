<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <script src="./agenda.js" defer></script>

    <title>Ejercicio 8: Agenda</title>
</head>
<body>

    <div id="encabezado">
        <h1>Agenda Telefonica</h1>
    </div>

    <!--formulario para agregar contactos-->
    <div id="formulario">
        <form>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Nombre y Apellido" id="nomyApe">
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Telefono" id="telefono">
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Direccion" id="direccion">
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email" id="email">
            </div>
            <button type="button" class="btn btn-primary" onclick="agregarContacto()">Agregar contacto</button>
        </form>
    </div>

    <!--tabla donde estan los contactos-->
    <div id="contenedor-tabla">
        <table class="table table-dark table-striped" id="tabla-contactos">
            <thead>
                <tr>
                    <th>Nombre y Apellido</th>
                    <th>Telefono</th>
                    <th>Direccion</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="body-tabla">
            </tbody>
        </table>
    </div>














    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
