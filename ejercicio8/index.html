<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <script src="./login.js" defer></script>
    <title>Ejercicio 8: Login</title>
</head>
<body>

    <div id="encabezado">
        <h1>Pagina Principal</h1>
        <h3>Agenda Telefonica</h3>
    </div>

    <!--formulario de login-->
    <div id="formulario">
        <form>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Nombre de usuario" id="nombreUsuario">
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Contraseña" id="contraseña">
            </div>
            <!--boton para iniciar sesion-->
            <button type="button" class="btn btn-primary" onclick="iniciarSesion()">Iniciar sesion</button>
        </form>
        <!--aca salta el error si los datos estan mal-->
        <p id="error">Usuario o contraseña incorrectos</p>
    </div>












    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
