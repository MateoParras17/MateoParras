<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
    <title>Ejercicio 6</title>
</head>
<body>

    <div id="encabezado">
        <h1>Pagina Principal</h1>
        <h3>Gestion de Biblioteca</h3>
    </div>

    <!--div con el formulario para ingresar los datos del libro-->
    <div id="formulario">
        <form>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Titulo" id="titulo">
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Autor" id="autor">
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Genero" id="genero">
            </div>
            <div class="mb-3">
                <input type="number" class="form-control" placeholder="Año de publicacion" id="anio">
            </div>
            <button type="button" class="btn btn-primary" onclick="agregarLibro()">Agregar libro</button>
            <button type="button" class="btn btn-success" onclick="mostrarLibros()">Mostrar libros</button>
        </form>
    </div>

    <!--aca se muestran todos los libros-->
    <div id="resultado" style="display:none">
        <h4>Libros en la biblioteca:</h4>
        <ul id="lista-libros"></ul>
    </div>













    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
