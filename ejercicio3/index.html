<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="encabezado">
        <h1>Pagina Principal</h1>
        <h4>Seleccione el producto</h4>
    </div>
    <div id="formulario">
        <select id="producto" class="form-select mb-3"><!--un select con bootstrap-->
            <option value="">Seleccione un producto</option>
            <option value="CocaCola">Coca-Cola</option>
            <option value="oreo">Galletas oreo</option>
            <option value="fideos">Fideos</option>
        </select>
            <form>
                <button type="button" class="btn btn-primary" onclick="mostrarProducto()">Mostrar Producto</button><!--boton para mostrar los resultados con bootstrap-->
            </form>
    </div>
    <div id="resultado" class="container mt-4 card p-4"> <!--aca se muestran todos los resultados-->
        <p>Nombre: <span id="mostrar-nombre"></span></p>
        <p>Precio: <span id="mostrar-precio"></span></p>
        <p>Descripcion: <span id="mostrar-descripcion"></span></p>
        <p>Marca: <span id="mostrar-marca"></span></p>
        <p>Precio con descuento: <span id="mostrar-descuento"></span></p>
        <img id="mostrar-imagen" src="">
    </div>























    <script src="./app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
