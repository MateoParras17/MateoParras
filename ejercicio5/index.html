<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <title>Ejercicio 5</title>
</head>
<body>

        <h1>Pagina principal</h1>

    <div id="contenedor">
        <div id="formulario">
            <h3>Ingrese los datos del empleado</h3>
            <form>
                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Nombre" id="nombre">
                </div>
                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Apellido" id="apellido">
                </div>
                <div class="mb-4">
                    <input type="number" class="form-control" placeholder="DNI" id="dni">
                </div>
                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Direccion" id="direccion">
                </div>
                <div class="mb-4">
                    <input type="number" class="form-control" placeholder="Sueldo por hora" id="sueldoxhs">
                </div>
                <div class="mb-4">
                    <input type="number" class="form-control" placeholder="Horas por mes" id="hsxmes">  <!-- pongo esto porque es lo que entiendo de la consigna-->
                </div>
                <button type="button" class=" btn btn-primary" onclick="mostrarEmpleado()"> Mostrar empleado</button>
            </form>
        </div>
    
        <p>Nombre: <span id="mostrar-nombre"></span></p>
        <p>Apellido: <span id="mostrar-apellido"></span></p>
        <p>dni: <span id="mostrar-dni"></span></p>
        <p>Direccion: <span id="mostrar-direccion"></span></p>
        <p>Salario anual: <span id="mostrar-salarioanual"></span></p>
    </div>



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./app.js"></script>
</body>
</html>
